name: Update Script Bundle

on:
  push:
    paths:
      - "scripts/**"
      - "tools/Generate-ScriptBundle.ps1"
      - ".github/workflows/update-script-bundle.yml"
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate script bundle
        shell: pwsh
        run: ./tools/Generate-ScriptBundle.ps1

      - name: Commit updated bundle
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- ScriptsReturn.json)" ]]; then
            echo "ScriptsReturn.json is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ScriptsReturn.json
          git commit -m "GAYDETER x littleBitchman"
          git push
